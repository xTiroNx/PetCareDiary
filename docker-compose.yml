services:
  postgres:
    image: postgres:16-alpine
    container_name: petcare-diary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: petcare
    ports:
      - "5432:5432"
    volumes:
      - petcare_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d petcare"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  petcare_postgres_data:
